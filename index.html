<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>行测刷题</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:clamp(14px,2.4vw,18px)}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#dce8d4;color:#2c3e2d;min-height:100vh;line-height:1.6}
.app{max-width:820px;margin:0 auto;padding:1rem;min-height:100vh;background:linear-gradient(180deg,#e4eedc,#d4e0cc)}
.hd{display:flex;justify-content:space-between;align-items:center;padding:.8rem 0 1.2rem;border-bottom:2px solid rgba(74,124,89,.15);margin-bottom:1.2rem}
.hd h1{font-size:1.25rem;color:#3d6b4a}
.nv a{padding:.3rem .7rem;border-radius:.4rem;color:#5a7a5a;cursor:pointer;font-size:.85rem}
.nv a.ac{background:#4a7c59;color:#fff}
.cd{background:rgba(255,255,255,.85);border-radius:.8rem;padding:1.2rem;margin-bottom:.8rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.5rem}
.sc{text-align:center;padding:1.5rem .8rem;cursor:pointer;transition:transform .15s}
.sc:active{transform:scale(.98)}
.sc .i{font-size:2rem;display:block}
.sc .n{font-weight:600;color:#3d6b4a;margin-top:.3rem}
.sc .c{font-size:.75rem;color:#7a9a7a}
.sc.fl{grid-column:1/-1}
.st{font-size:.9rem;font-weight:600;color:#3d6b4a;margin:1rem 0 .5rem}
.oc{padding:.7rem;text-align:center;border-radius:.5rem;background:rgba(255,255,255,.7);cursor:pointer;border:2px solid transparent;font-size:.85rem}
.oc.sl{border-color:#4a7c59;background:rgba(74,124,89,.1);font-weight:600}
.btn{padding:.5rem 1.2rem;border:none;border-radius:.5rem;font-size:.85rem;cursor:pointer;font-family:inherit}
.bp{background:#4a7c59;color:#fff}
.bs{background:rgba(74,124,89,.1);color:#3d6b4a}
.bo{background:transparent;border:1.5px solid #4a7c59;color:#3d6b4a}
.bf{width:100%}
.bk{font-size:.8rem;color:#6a8a6a;cursor:pointer;margin-bottom:.5rem;background:0;border:none;font-family:inherit}
.fx{position:fixed;bottom:0;left:0;right:0;padding:.7rem 1rem;background:rgba(220,232,212,.95);backdrop-filter:blur(6px);border-top:1px solid rgba(74,124,89,.1);display:none}
.fx.sh{display:block}
.pg{display:none}
.pg.ac{display:block;animation:fd .2s}
@keyframes fd{from{opacity:0}}
.sg{display:grid;gap:.5rem;margin-bottom:.8rem}
.s3{grid-template-columns:1fr 1fr 1fr}
.s2{grid-template-columns:1fr 1fr}
.qs{font-size:.9rem;line-height:1.8;margin-bottom:1rem}
.oi{padding:.6rem .8rem;margin-bottom:.4rem;border-radius:.5rem;background:rgba(255,255,255,.7);cursor:pointer;border:2px solid transparent;font-size:.85rem}
.oi.sl{border-color:#4a7c59;background:rgba(74,124,89,.08)}
.oi.ri{border-color:#4caf50;background:rgba(76,175,80,.08)}
.oi.wr{border-color:#e57373;background:rgba(229,115,115,.08)}
.oi .lb{font-weight:600;margin-right:.3rem}
.wi{padding:.8rem;margin-bottom:.6rem;background:rgba(255,255,255,.7);border-radius:.6rem;border:1px solid rgba(229,115,115,.15);font-size:.85rem}
.wi .co{color:#4caf50;font-weight:600}
.wi .wr{color:#e57373;text-decoration:line-through}
.et{font-size:.78rem;cursor:pointer;flex:1;text-align:center;padding:.4rem .8rem;border:none;background:rgba(74,124,89,.08);color:#5a7a5a;font-family:inherit}
.et.ac{background:rgba(74,124,89,.15);color:#2c5e3c;font-weight:600}
.eb{background:rgba(255,255,255,.7);padding:.8rem;font-size:.8rem;line-height:1.7;display:none;border-radius:0 0 .5rem .5rem}
.eb.ac{display:block}
.eb .tg{display:inline-block;background:#4a7c59;color:#fff;font-size:.65rem;padding:.05rem .4rem;border-radius:.2rem;margin-bottom:.3rem}
.ep{text-align:center;padding:2rem;color:#8aaa8a}
.bn{display:flex;justify-content:space-between;margin-top:1rem;gap:.5rem}
.rs{font-size:3rem;font-weight:700;color:#4a7c59;margin:.5rem 0}
.pb{height:3px;background:rgba(74,124,89,.15);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.pf{height:100%;background:#4a7c59;border-radius:2px;transition:.3s;width:0}
.qh{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.82rem;color:#6a8a6a}
.qn{font-size:.82rem;color:#7a9a7a;margin-bottom:.3rem}
#lo{text-align:center;padding:2rem;color:#8aaa8a;font-size:.85rem}
#lo .sp{display:inline-block;width:1.2rem;height:1.2rem;border:2px solid #4a7c59;border-top-color:transparent;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:.4rem}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:480px){.sc{padding:1rem .5rem}.sc .i{font-size:1.5rem}}
</style></head><body>
<div class=app id=app>
<header class=hd><h1>&#x1F4DD; 刷题本</h1><nav class=nv>
<a onclick="pg('hm')" class=ac data-p=hm>首页</a>
<a onclick="pg('ct')" data-p=ct>错题</a>
<a onclick="pg('st')" data-p=st>统计</a></nav></header>
<div id=lo><div class=sp></div>加载题库中...</div>
<div id=p-hm class="pg">
<div class=g2>
<div class="cd sc" onclick="sq(0)"><span class=i>&#x1F5E3;&#xFE0F;</span><div class=n>言语理解</div><div class=c id=cy></div></div>
<div class="cd sc" onclick="sq(1)"><span class=i>&#x1F9E0;</span><div class=n>判断推理</div><div class=c id=cp></div></div>
<div class="cd sc fl" onclick="pg('ct')"><span class=i>&#x1F4D5;</span><div class=n>错题本</div><div class=c id=cc></div></div>
<div class="cd sc fl" onclick="pg('st')"><span class=i>&#x1F4CA;</span><div class=n>学习统计</div><div class=c>正确率 &middot; 进度</div></div></div>
<div style=text-align:center;font-size:.78rem;color:#8aaa8a>共 <span id=tq></span> 题 &middot; 已完成 <span id=dq></span> 题</div></div>
<div id=p-sc class=pg>
<button class=bk onclick="pg('hm')">&#x2190; 返回</button>
<div class=st>选择题库</div><div class=sg id=so></div>
<div class=st>题目数量</div><div class="sg s2" id=co></div>
<div class="fx sh"><button class="btn bp bf" id=bt onclick=bq() disabled>开始刷题</button></div></div>
<div id=p-qz class=pg>
<button class=bk onclick=xq()>&#x2190; 退出</button>
<div class=qh><span id=qp></span><span id=qc>&#x2705; 0</span></div>
<div class=pb><div class=pf id=pp></div></div>
<div id=qc2></div>
<div class=bn><button class="btn bs" onclick=pv() id=pr>上一题</button>
<button class="btn bp" onclick=nx() id=nx>下一题</button></div>
<div class=fx id=sa><button class="btn bp bf" onclick=sm() id=smb>提交批改</button></div></div>
<div id=p-rs class=pg>
<div class=cd style=text-align:center;padding:2rem>
<div style=color:#6a8a6a>得分</div><div class=rs id=sr></div>
<div style=font-size:.85rem;color:#6a8a6a;margin-bottom:1rem id=ss></div>
<div style=display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap>
<button class="btn bp" onclick=rv()>查看详情+讲解</button>
<button class="btn bo" onclick="pg('hm')">返回首页</button></div></div>
<div id=rd style=display:none></div>
<div class="fx sh" id=rb style=display:none><button class="btn bo bf" onclick="pg('hm')">返回首页</button></div></div>
<div id=p-ct class=pg><button class=bk onclick="pg('hm')">&#x2190; 返回首页</button><div id=cc2></div></div>
<div id=p-st class=pg><div class=cd id=stc></div></div></div>
<script>
var Q={},E={};
var S=[];S[0]="言语理解";S[1]="判断推理";
function al(i){return String.fromCharCode(65+i)}
function gd(){return JSON.parse(localStorage.getItem("qd")||"{}")}
function sd(d){localStorage.setItem("qd",JSON.stringify(d))}
function gw(){return JSON.parse(localStorage.getItem("qw")||"[]")}
function sw(w){localStorage.setItem("qw",JSON.stringify(w))}
var SI={};
function up(){var g=gd(),t=0,d=0;for(var k in Q)t+=Q[k].length;for(var k in g)for(var i in g[k])d++;
document.getElementById("tq").textContent=t;document.getElementById("dq").textContent=d;
var w=gw();document.getElementById("cc").textContent=w.length+"题待复习";
["cy","cp"].forEach(function(id,i){var s=S[i],c=0;for(var k in Q)if(k.includes(s))c+=Q[k].length;document.getElementById(id).textContent=c+"题"});}
function pg(n){document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("ac")});
var e=document.getElementById("p-"+n);if(e)e.classList.add("ac");
document.querySelectorAll(".nv a").forEach(function(a){a.classList.remove("ac")});
var na=document.querySelector(".nv a[data-p='"+n+"']");if(na)na.classList.add("ac");
window.scrollTo(0,0);up();if(n=="ct")wb();if(n=="st")st2();}
function sq(i){var s=S[i];var a=[];for(var k in Q)if(k.includes(s))a.push(k);
var h="";a.forEach(function(k){var g=gd(),c=Q[k].length,rem=g[k]?c-Object.keys(g[k]).length:c;
var nm=k.replace(s,"").replace("-","").trim()||k;
h+='<div class="oc" data-k="'+k+'" onclick="s2(this)">'+nm+"<br><small style=color:#8aaa8a>"+rem+"/"+c+"题未做</small></div>"});
document.getElementById("so").innerHTML=h;
document.getElementById("so").className="sg "+(a.length>2?"s3":"s2");
document.getElementById("co").innerHTML=[10,15,20,30].map(function(n){return'<div class="oc'+(n==10?" sl":"")+'" data-c='+n+' onclick="sc(this)">'+n+"题</div>"}).join("");
SI.src="";SI.cnt=10;document.getElementById("bt").disabled=true;pg("sc")}
function s2(el){document.querySelectorAll("#so .oc").forEach(function(c){c.classList.remove("sl")});
el.classList.add("sl");SI.src=el.dataset.k;document.getElementById("bt").disabled=false}
function sc(el){document.querySelectorAll("#co .oc").forEach(function(c){c.classList.remove("sl")});
el.classList.add("sl");SI.cnt=parseInt(el.dataset.c)}
function bq(){var pool=Q[SI.src]||[];var g=gd()[SI.src]||{};
var av=pool.filter(function(q){return!g[q.i]});
if(!av.length){alert("已完成！");return}
var sh=[...av].sort(function(){return Math.random()-.5});
SI.qs=sh.slice(0,Math.min(SI.cnt||10,sh.length));SI.idx=0;SI.ans={};SI.sub=false;SI.res=[];
r2();document.getElementById("sa").classList.add("sh");document.getElementById("smb").disabled=false;
document.getElementById("smb").textContent="提交批改";pg("qz")}
function r2(){var q=SI.qs[SI.idx];if(!q)return;var t=SI.qs.length;
document.getElementById("qp").textContent="第 "+(SI.idx+1)+"/"+t+" 题";
document.getElementById("pp").style.width=((SI.idx+1)/t*100)+"%";
var ac=0;for(var k in SI.ans)if(SI.ans[k])ac++;document.getElementById("qc").textContent="✅ "+ac;
var sel=SI.ans[SI.idx]||"",sub=SI.sub;var res=sub?SI.res[SI.idx]:null;var o=q.o||[];
var h="<div class=qn>"+q.i+".</div><div class=qs>"+q.s+"</div>";
o.forEach(function(o,i){var l=al(i),is=sel==l,cls="oi";
if(sub&&res){if(l==res[0])cls+=" ri";if(is&&l!=res[0])cls+=" wr"}else if(is)cls+=" sl";
h+='<div class="'+cls+'" onclick="'+(sub?"":"so('"+l+"')")+'"><span class=lb>'+l+".</span> "+o+"</div>"});
document.getElementById("qc2").innerHTML=h;
document.getElementById("pr").disabled=SI.idx==0;document.getElementById("nx").disabled=SI.idx==t-1||SI.sub}
function so(l){if(SI.sub)return;SI.ans[SI.idx]=SI.ans[SI.idx]==l?"":l;r2()}
function pv(){if(SI.idx>0){SI.idx--;r2()}}
function nx(){if(SI.idx<SI.qs.length-1){SI.idx++;r2()}}
function xq(){if(SI.sub||Object.keys(SI.ans).length==0||confirm("确定退出？"))pg("hm")}
function sm(){for(var i=0;i<SI.qs.length;i++)if(!SI.ans[i]){alert("请完成所有题目！");return}
SI.sub=true;var g=gd(),gm=g[SI.src]||{},c=0;SI.res=[];
SI.qs.forEach(function(q,idx){var ua=SI.ans[idx]||"",ca=q.a,is=ua==ca;
if(is)c++;SI.res.push([ca,ua,is]);gm[q.i]=true;
if(!is){var w=gw(),wk=SI.src+"-"+q.i;if(!w.find(function(x){return x.wk==wk})){
w.push({wk:wk,src:SI.src,i:q.i,g:q.g,s:q.s,o:q.o,a:ca,ua:ua});sw(w)}}});
g[SI.src]=gm;sd(g);r2();
document.getElementById("sr").textContent=c+"/"+SI.qs.length;
document.getElementById("ss").textContent="正确率 "+Math.round(c/SI.qs.length*100)+"%";
document.getElementById("rd").style.display="none";
document.getElementById("sa").classList.remove("sh");document.getElementById("rb").style.display="block";pg("rs")}
function rv(){var d=document.getElementById("rd");
var h="<div style=border-top:1px solid rgba(74,124,89,.1);padding-top:1rem><div style=font-weight:600;color:#3d6b4a;margin-bottom:.5rem>逐题详解</div>";
SI.qs.forEach(function(q,idx){var r=SI.res[idx],is=r[2],o=q.o||[];var exp=q.g?ge(SI.src,q.g,q.i):null;
h+='<div style="background:rgba(255,255,255,.5);border-radius:.5rem;padding:.7rem;margin-bottom:.6rem;border:1px solid '+(is?"rgba(76,175,80,.2)":"rgba(229,115,115,.2)")+'">';
h+="<div style=font-size:.78rem;color:#8aaa8a;margin-bottom:.3rem>第"+(idx+1)+"题 "+(is?"✅":"❌")+"</div>";
h+="<div style=font-size:.8rem;line-height:1.6;margin-bottom:.3rem>"+q.s+"</div>";
o.forEach(function(o,i){var l=al(i),cs="font-size:.78rem";
if(l==r[0])cs+=";color:#4caf50;font-weight:600";else if(l==r[1])cs+=";color:#e57373;text-decoration:line-through";
h+='<div style="'+cs+'">'+l+". "+o+"</div>"});
h+='<div style=margin-top:.3rem;font-size:.78rem>你: <span style=color:#e57373>'+r[1]+"</span> | 对: <span style=color:#4caf50>"+r[0]+"</span></div>";
if(exp)h+=et(exp,"r"+idx);else h+='<div style=margin-top:.3rem;font-size:.75rem;color:#8aaa8a>（暂无解析）</div>';
h+="</div>"});h+="</div>";d.innerHTML=h;d.style.display="block";document.getElementById("rb").style.display="none"}
function ge(s,g,qn){var k=s+"-G"+g+"-Q"+qn;return E[k]||null}
function et(e,uid){if(!e)return"";var a=e[0]||"",t=e[1]||"",h=e[2]||"";
if(a.length<=3&&t.length<=2&&h.length<=3)return"";
var r='<div class=etb>';
if(t.length>2)r+='<button class="et ac" onclick="ta(this,&#39;t-'+uid+'&#39;)">&#x1F4CC;切入点</button>';
if(a.length>3)r+='<button class="et'+(t.length>2?"":" ac")+'" onclick="ta(this,&#39;a-'+uid+'&#39;)">&#x1F4DD;解析</button>';
if(h.length>3)r+='<button class="et'+(t.length>2||a.length>3?"":" ac")+'" onclick="ta(this,&#39;h-'+uid+'&#39;)">&#x1F393;花生</button>';
r+="</div>";
if(t.length>2)r+='<div class="eb ac" data-t="t-'+uid+'"><span class=tg>快速定位</span><br>'+t+"</div>";
if(a.length>3)r+='<div class="eb'+(t.length>2?"":" ac")+'" data-t="a-'+uid+'"><span class=tg>解析</span><br>'+a+"</div>";
if(h.length>3)r+='<div class="eb'+(t.length>2||a.length>3?"":" ac")+'" data-t="h-'+uid+'"><span class=tg>花生十三</span><br>'+h.replace(/\\n/g,"<br>")+"</div>";return r}
function ta(el,t){var p=el.parentElement;
p.querySelectorAll(".et").forEach(function(x){x.classList.remove("ac")});
p.querySelectorAll(".eb").forEach(function(x){x.classList.remove("ac")});
el.classList.add("ac");var tg=p.querySelector('.eb[data-t="'+t+'"]');if(tg)tg.classList.add("ac")}
function wb(){var w=gw(),d=document.getElementById("cc2");
if(!w.length){d.innerHTML='<div class=ep><div style=font-size:2rem>&#x1F389;</div>暂无错题</div>';return}
var g={};w.forEach(function(x){if(!g[x.src])g[x.src]=[];g[x.src].push(x)});
var h='<div style=display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem><button class="btn bp" onclick=wl() style=font-size:.8rem>&#x1F4CB; 全部错题</button><button class="btn bo" onclick=wq() style=font-size:.8rem>&#x1F501; 练错题</button></div><div class=st>&#x1F4D5; 错题分类</div>';
for(var s in g)h+='<div class=cd style="padding:.7rem;cursor:pointer;display:flex;justify-content:space-between" onclick="wl(''+s+'')"><span>'+s+'</span><span style="background:#e57373;color:#fff;font-size:.7rem;padding:.1rem .5rem;border-radius:1rem">'+g[s].length+"题</span></div>";
d.innerHTML=h}
function wl(f){var w=f?gw().filter(function(x){return x.src==f}):gw();var d=document.getElementById("cc2");
var h='<button class=bk onclick=pg("ct")>&#x2190; 返回错题本</button><div style=display:flex;gap:.5rem;margin-bottom:.5rem><button class="btn bo" onclick="sw([]);wb()" style=font-size:.75rem;color:#e57373>清空</button></div>';
w.forEach(function(x,i){var o=x.o||[],exp=x.g?ge(x.src,x.g,x.i):null;
h+='<div class=wi><div style=line-height:1.7>'+x.s+"</div>";
o.forEach(function(o,oi){var l=al(oi);
if(l==x.a)h+='<div class=co>'+l+". "+o+"</div>";else if(l==x.ua)h+='<div class=wr>'+l+". "+o+"</div>";else h+="<div>"+l+". "+o+"</div>"});
h+='<div style=margin-top:.3rem;font-size:.78rem;color:#6a8a6a>你: <span class=wr>'+x.ua+"</span> | 对: <span class=co>"+x.a+"</span></div>";
if(exp)h+=et(exp,"w"+i);else h+='<div style=margin-top:.3rem;font-size:.75rem;color:#8aaa8a>（暂无解析）</div>';
h+="</div>"});d.innerHTML=h}
function wq(){var w=gw();if(!w.length){alert("暂无错题");return}
var sh=[...w].sort(function(){return Math.random()-.5}).slice(0,10);
SI.qs=sh.map(function(x){return{i:x.i,s:x.s,o:x.o,a:x.a,g:x.g}});
SI.idx=0;SI.ans={};SI.sub=false;SI.res=[];
SI.src="错题重做";r2();document.getElementById("sa").classList.add("sh");
document.getElementById("smb").disabled=false;document.getElementById("smb").textContent="提交批改";pg("qz")}
function st2(){var g=gd(),w=gw(),t=0,d=0;for(var k in Q)t+=Q[k].length;for(var k in g)for(var i in g[k])d++;
var h='<div style=font-weight:600;color:#3d6b4a;margin-bottom:.8rem>&#x1F4CA; 学习统计</div>';
h+='<div style=display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem><span>总题数</span><span style=font-weight:600;color:#3d6b4a>'+t+"</span></div>";
h+='<div style=display:flex;justify-content:space-between;padding:.4rem 0;font-size:.82rem><span>已完成</span><span style=font-weight:600;color:#3d6b4a>'+d+" ("+Math.round(d/t*100)+"%)</span></div>";
h+='<div style=display:flex;justify-content:space-between;padding:.4rem 0;font-size:.82rem><span>待复习错题</span><span style=font-weight:600;color:#e57373>'+w.length+"</span></div>";
document.getElementById("stc").innerHTML=h}
fetch("quiz-data.json").then(function(r){return r.json()}).then(function(d){Q=d;ld()});
fetch("explanation-data.json").then(function(r){return r.json()}).then(function(d){E=d});
function ld(){document.getElementById("lo").style.display="none";document.getElementById("p-hm").classList.add("ac");up()}
</script></body></html>
